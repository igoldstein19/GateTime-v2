    <line x1="72" y1="8" x2="72" y2="18" stroke="#003B71" stroke-width="0.8" opacity="0.5"/>
    <line x1="72" y1="126" x2="72" y2="136" stroke="#003B71" stroke-width="0.8" opacity="0.5"/>
    <line x1="8" y1="72" x2="18" y2="72" stroke="#003B71" stroke-width="0.8" opacity="0.5"/>
    <line x1="126" y1="72" x2="136" y2="72" stroke="#003B71" stroke-width="0.8" opacity="0.5"/>
    <line x1="72" y1="72" x2="72" y2="32" stroke="#003B71" stroke-width="1.8" stroke-linecap="round"/>
